<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Sector 28 pocket map">
  <title>Rohini Sector 28 Pocket Map</title>
  <defs>
    <style>
      .pocket {
        stroke: #ffffff;
        stroke-width: 2;
        cursor: pointer;
        transition: opacity 0.15s, stroke-width 0.15s;
      }
      .pocket:hover, .pocket:focus {
        stroke: #1e293b;
        stroke-width: 3;
        outline: none;
      }
      .pocket.dim {
        opacity: 0.55;
      }
      .pocket.active {
        stroke: #0f172a;
        stroke-width: 4;
      }
      .label {
        font: 700 18px system-ui, -apple-system, "Segoe UI", sans-serif;
        fill: #ffffff;
        text-anchor: middle;
        pointer-events: none;
      }
      .label-small {
        font: 600 13px system-ui, sans-serif;
        fill: #ffffff;
        text-anchor: middle;
        pointer-events: none;
      }
      .label-block {
        font: 700 14px system-ui, sans-serif;
        fill: #1e293b;
        text-anchor: middle;
        pointer-events: none;
      }
      .road { stroke: #cbd5e1; stroke-width: 3; fill: none; }
      .road-minor { stroke: #e2e8f0; stroke-width: 1.5; fill: none; }
      .ground { fill: #f1f5f9; }
    </style>
  </defs>

  <rect width="1000" height="700" fill="#f8fafc"/>

  <!-- Ground / unpaved areas -->
  <rect class="ground" x="20" y="20" width="960" height="660"/>

  <!-- Outer boundary of Sector 28 -->
  <rect x="20" y="20" width="960" height="660" fill="none" stroke="#1e293b" stroke-width="2" rx="6"/>

  <!-- Block A label band -->
  <rect x="40" y="40" width="700" height="40" fill="#1e293b" rx="4"/>
  <text class="label-block" x="390" y="65" style="fill:#ffffff">BLOCK A</text>

  <!-- Block A: 4 pockets side-by-side (Pockets 3, 4, 5, 6) -->
  <path class="pocket" data-pocket="A-3" tabindex="0" fill="#ea580c" d="M 40 80 L 215 80 L 215 290 L 40 290 Z">
    <title>Block A · Pocket 3 — 9 registrations</title>
  </path>
  <text class="label" x="127" y="180">A-3</text>
  <text class="label-small" x="127" y="205">9 regs</text>

  <path class="pocket" data-pocket="A-4" tabindex="0" fill="#fed7aa" d="M 215 80 L 390 80 L 390 290 L 215 290 Z">
    <title>Block A · Pocket 4 — 3 registrations</title>
  </path>
  <text class="label" x="302" y="180" style="fill:#9a3412">A-4</text>
  <text class="label-small" x="302" y="205" style="fill:#9a3412">3 regs</text>

  <path class="pocket" data-pocket="A-5" tabindex="0" fill="#f97316" d="M 390 80 L 565 80 L 565 290 L 390 290 Z">
    <title>Block A · Pocket 5 — 6 registrations</title>
  </path>
  <text class="label" x="477" y="180">A-5</text>
  <text class="label-small" x="477" y="205">6 regs</text>

  <path class="pocket" data-pocket="A-6" tabindex="0" fill="#fdba74" d="M 565 80 L 740 80 L 740 290 L 565 290 Z">
    <title>Block A · Pocket 6 — 4 registrations</title>
  </path>
  <text class="label" x="652" y="180" style="fill:#9a3412">A-6</text>
  <text class="label-small" x="652" y="205" style="fill:#9a3412">4 regs</text>

  <!-- GH flats (right side) -->
  <rect x="760" y="40" width="200" height="40" fill="#1e3a8a" rx="4"/>
  <text class="label-block" x="860" y="65" style="fill:#ffffff">GH FLATS</text>

  <path class="pocket" data-pocket="GH-1" tabindex="0" fill="#1d4ed8" d="M 760 80 L 860 80 L 860 150 L 760 150 Z">
    <title>GH-1 — 8 registrations (DDA LIG flats)</title>
  </path>
  <text class="label" x="810" y="115">GH-1</text>
  <text class="label-small" x="810" y="135">8</text>

  <path class="pocket" data-pocket="GH-2" tabindex="0" fill="#bfdbfe" d="M 860 80 L 960 80 L 960 150 L 860 150 Z">
    <title>GH-2 — 1 registration (DDA MIG flats)</title>
  </path>
  <text class="label" x="910" y="115" style="fill:#1e3a8a">GH-2</text>
  <text class="label-small" x="910" y="135" style="fill:#1e3a8a">1</text>

  <path class="pocket" data-pocket="GH-3" tabindex="0" fill="#93c5fd" d="M 760 150 L 860 150 L 860 220 L 760 220 Z">
    <title>GH-3 — 2 registrations</title>
  </path>
  <text class="label" x="810" y="185" style="fill:#1e3a8a">GH-3</text>
  <text class="label-small" x="810" y="205" style="fill:#1e3a8a">2</text>

  <path class="pocket" data-pocket="GH-4" tabindex="0" fill="#3b82f6" d="M 860 150 L 960 150 L 960 220 L 860 220 Z">
    <title>GH-4 — 5 registrations</title>
  </path>
  <text class="label" x="910" y="185">GH-4</text>
  <text class="label-small" x="910" y="205">5</text>

  <!-- Internal road between Block A and Block C -->
  <line class="road" x1="40" y1="310" x2="960" y2="310"/>

  <!-- Block C label band -->
  <rect x="40" y="320" width="700" height="40" fill="#1e293b" rx="4"/>
  <text class="label-block" x="390" y="345" style="fill:#ffffff">BLOCK C</text>

  <!-- Block C: 5 pockets side-by-side (Pockets 1, 2, 3, 4, 5) -->
  <path class="pocket" data-pocket="C-1" tabindex="0" fill="#dc2626" d="M 40 360 L 184 360 L 184 600 L 40 600 Z">
    <title>Block C · Pocket 1 — 11 registrations</title>
  </path>
  <text class="label" x="112" y="475">C-1</text>
  <text class="label-small" x="112" y="500">11 regs</text>

  <path class="pocket" data-pocket="C-2" tabindex="0" fill="#b91c1c" d="M 184 360 L 328 360 L 328 600 L 184 600 Z">
    <title>Block C · Pocket 2 — 16 registrations (hottest)</title>
  </path>
  <text class="label" x="256" y="475">C-2</text>
  <text class="label-small" x="256" y="500">16 regs</text>

  <path class="pocket" data-pocket="C-3" tabindex="0" fill="#fca5a5" d="M 328 360 L 472 360 L 472 600 L 328 600 Z">
    <title>Block C · Pocket 3 — 3 registrations</title>
  </path>
  <text class="label" x="400" y="475" style="fill:#7f1d1d">C-3</text>
  <text class="label-small" x="400" y="500" style="fill:#7f1d1d">3 regs</text>

  <path class="pocket" data-pocket="C-4" tabindex="0" fill="#ef4444" d="M 472 360 L 616 360 L 616 600 L 472 600 Z">
    <title>Block C · Pocket 4 — 9 registrations</title>
  </path>
  <text class="label" x="544" y="475">C-4</text>
  <text class="label-small" x="544" y="500">9 regs</text>

  <path class="pocket" data-pocket="C-5" tabindex="0" fill="#fecaca" d="M 616 360 L 760 360 L 760 600 L 616 600 Z">
    <title>Block C · Pocket 5 — 2 registrations</title>
  </path>
  <text class="label" x="688" y="475" style="fill:#7f1d1d">C-5</text>
  <text class="label-small" x="688" y="500" style="fill:#7f1d1d">2 regs</text>

  <!-- Right side: Unknown / unmapped -->
  <rect x="760" y="320" width="200" height="40" fill="#475569" rx="4"/>
  <text class="label-block" x="860" y="345" style="fill:#ffffff">UNMAPPED</text>

  <path class="pocket" data-pocket="Unknown" tabindex="0" fill="#94a3b8" d="M 760 360 L 960 360 L 960 600 L 760 600 Z">
    <title>Unmapped — 11 records with bare numeric plot numbers (no block/pocket info)</title>
  </path>
  <text class="label" x="860" y="475">Unknown</text>
  <text class="label-small" x="860" y="500">11 records</text>
  <text class="label-small" x="860" y="520" style="font-size:10px;opacity:0.85">(bare plot #)</text>

  <!-- Internal road network -->
  <line class="road-minor" x1="215" y1="80" x2="215" y2="600"/>
  <line class="road-minor" x1="390" y1="80" x2="390" y2="600"/>
  <line class="road-minor" x1="565" y1="80" x2="565" y2="600"/>
  <line class="road-minor" x1="184" y1="360" x2="184" y2="600"/>
  <line class="road-minor" x1="328" y1="360" x2="328" y2="600"/>
  <line class="road-minor" x1="472" y1="360" x2="472" y2="600"/>
  <line class="road-minor" x1="616" y1="360" x2="616" y2="600"/>
  <line class="road-minor" x1="760" y1="40" x2="760" y2="600"/>

  <!-- Legend -->
  <g transform="translate(40, 630)">
    <text class="label-block" x="0" y="0" style="text-anchor:start;font-size:12px;fill:#475569">Activity (last 30 days):</text>
    <rect x="155" y="-12" width="16" height="14" fill="#fecaca" stroke="#fff"/>
    <text class="label-block" x="176" y="0" style="text-anchor:start;font-size:12px;fill:#475569">1-2</text>
    <rect x="215" y="-12" width="16" height="14" fill="#fdba74" stroke="#fff"/>
    <text class="label-block" x="236" y="0" style="text-anchor:start;font-size:12px;fill:#475569">3-4</text>
    <rect x="280" y="-12" width="16" height="14" fill="#f97316" stroke="#fff"/>
    <text class="label-block" x="301" y="0" style="text-anchor:start;font-size:12px;fill:#475569">5-6</text>
    <rect x="345" y="-12" width="16" height="14" fill="#ea580c" stroke="#fff"/>
    <text class="label-block" x="366" y="0" style="text-anchor:start;font-size:12px;fill:#475569">7-9</text>
    <rect x="410" y="-12" width="16" height="14" fill="#dc2626" stroke="#fff"/>
    <text class="label-block" x="431" y="0" style="text-anchor:start;font-size:12px;fill:#475569">10-11</text>
    <rect x="480" y="-12" width="16" height="14" fill="#b91c1c" stroke="#fff"/>
    <text class="label-block" x="501" y="0" style="text-anchor:start;font-size:12px;fill:#475569">12+</text>

    <text class="label-block" x="560" y="0" style="text-anchor:start;font-size:12px;fill:#475569">Block A: plotted 60 sqm · Block C: plotted 32 sqm · GH: DDA flats 42 sqm</text>
  </g>
</svg>
